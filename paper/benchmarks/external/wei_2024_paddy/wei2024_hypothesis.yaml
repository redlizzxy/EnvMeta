# EnvMeta 假说评分器 — Wei et al. 2024 Microbiome 核心假说复现
#
# Source: Wei et al. (2024) Microbiome 12:236
#         "Various microbial taxa couple arsenic transformation to nitrogen
#          and carbon cycling in paddy soils"
#         DOI: 10.1186/s40168-024-01952-4
#
# 复现目标：把作者的核心机制叙述写为 EnvMeta YAML，看 EnvMeta 是否能
# 自动评出"假说支持度"，复现作者结论。

name: "Wei2024_paddy_As-N_coupling"
description: |
  Wei et al. 2024 Microbiome 核心假说复现：
  在砷污染稻田中，As(III) 氧化菌（携 aioA / arxA 基因）与反硝化菌
  （携 napA/narG/nirK/nirS/norB/nosZ）共出现，提示 As 氧化与 N 循环
  通过 NO₃⁻ / NO₂⁻ 作为电子受体发生功能耦合。

  关键证据：S9 列出的 20 MAG 同时携至少 1 个 As(III) 氧化基因 +
  至少 1 个反硝化基因，且分布于多个独立 phylum，符合 Bradford Hill
  consistency 标准（Hill 1965）。

version: "1.0"

# 阈值 — 与 EnvMeta 默认一致
strong_threshold: 0.75
suggestive_threshold: 0.40

claims:
  # ─────────────────────────────────────────────────────────
  # Bradford Hill required veto: As(III) 氧化必须 active
  # 这是耦合假说的"必要条件"——没有 As ox 就谈不上 As-N 耦合
  # ─────────────────────────────────────────────────────────
  - id: arsenite_oxidation_active
    type: pathway_active
    weight: 1.5
    required: true
    params:
      pathway: "Arsenite oxidation"
      min_completeness: 30
    explanation: |
      原文 Fig 1: aioA / arxA hits identified across 36 paddy samples,
      Table S6 shows aioA-carrying reads in both AsContam and NoContam.
      EnvMeta should mark this pathway as active (pathway_completeness ≥ 30%).

  # ─────────────────────────────────────────────────────────
  # Bradford Hill required veto: 反硝化通路必须 active
  # ─────────────────────────────────────────────────────────
  - id: nitrate_reduction_active
    type: pathway_active
    weight: 1.5
    required: true
    params:
      pathway: "Nitrate reduction"
      min_completeness: 30
    explanation: |
      原文 Table S8: napA / narG hits in 多个 MAG, 含 N 循环骨架基因。
      作者用此证据论证 N 循环活跃。

  # ─────────────────────────────────────────────────────────
  # 加分项: 亚硝酸盐还原（denitrification 下游）
  # ─────────────────────────────────────────────────────────
  - id: nitrite_reduction_active
    type: pathway_active
    weight: 1.0
    params:
      pathway: "Nitrite reduction"
      min_completeness: 30
    explanation: |
      nirK / nirS 是反硝化经典 marker，多 MAG 携带证明完整反硝化链路。

  # ─────────────────────────────────────────────────────────
  # 加分项: NO/N2O 还原（denitrification 终端）
  # ─────────────────────────────────────────────────────────
  - id: nitrous_oxide_reduction_active
    type: pathway_active
    weight: 0.7
    params:
      pathway: "N2O reduction"
      min_completeness: 30

  # ─────────────────────────────────────────────────────────
  # 核心耦合 claim：As(III) ↔ NO3-（论文核心论断）
  # KB schematic 里 As(III) 在 arsenic / NO3- 在 nitrogen
  # ─────────────────────────────────────────────────────────
  - id: as_n_coupling_arsenite_nitrate
    type: coupling_possible
    weight: 2.0
    required: true
    params:
      species_a: "As(III)"
      species_b: "NO3-"
    explanation: |
      论文核心机制叙述：As(III) 在硝酸盐（NO3-）作为电子受体的条件下被氧化。
      此 coupling 出现在 Table S9 的 20 MAG 中（同时携 aioA/arxA + napA/narG）。
      若 EnvMeta 也能 detect 此 coupling 通过 KB couplings 表，证明工具可
      自动重现作者结论。
