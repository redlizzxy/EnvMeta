# EnvMeta 假说评分器 — Liu et al. 2023 npj Biofilms — STRESS TEST
#
# Source: Liu R, Wei X, Song W, et al. (2023) "Unexpected genetic and microbial
#         diversity for arsenic cycling in deep sea cold seep sediments"
#         npj Biofilms and Microbiomes 9:13
# DOI:    10.1038/s41522-023-00382-8
#
# ═══════════════════════════════════════════════════════════════════════
#  PRE-REGISTERED STRESS HYPOTHESIS (Paper 4 / v0.9)
# ═══════════════════════════════════════════════════════════════════════
#
# 本 YAML 在跑 EnvMeta **之前** commit，作为 stress test pre-registration 证据。
# git timestamp 锁定。
#
# 目的：测试 EnvMeta scorer 的 **discrimination power**。
#   - 配套 calibration YAML (liu2023_hypothesis.yaml) 已 commit 42168da → STRONG (4/4)
#   - 本 stress YAML 故意写违背先验的 risky claims，期望 overall_score 低
#   - 双层证据组合："scorer 在 backbone 上 STRONG, 在 reversed/cross-topic 上 weak/insufficient"
#     才是 discrimination evidence
#
# 假设构成原则（同 calibration YAML）：
#   1. 跑 EnvMeta 之前 commit
#   2. 不调阈值（默认 30/0.75/0.40）
#   3. 不引用 Liu 2023 论文 specific finding
#   4. 引用早于 2018（设计实验时）的综述
#
# 期望 overall_score:
#   - 如果 scorer discrimination power 强：3 stress claims unsatisfied + 1 calib satisfied
#     → overall = (0+0+0+1.0×1.0) / 5.0 = 0.20 → weak
#   - 如果 scorer 太松（worst case）：3 stress satisfied + 1 calib satisfied
#     → overall = (1.5+1.0+1.5+1.0) / 5.0 = 1.00 → strong (糟糕，鉴别力差)
#
# 见 docs/hypothesis_writing_guide.md §3 (Pre-prediction) + §5 (双层模板)。

name: "Liu2023_coldseep_stress_hypothesis"
description: |
  Stress test hypothesis (pre-registered before EnvMeta run). 故意写违背先验
  的 risky claims，测试 EnvMeta scorer 的 discrimination power。配套 Liu2023
  calibration YAML (liu2023_hypothesis.yaml) 形成双层证据。

version: "1.0"
strong_threshold: 0.75
suggestive_threshold: 0.40

claims:
  # ═════════════════════════════════════════════════════════
  #  A. 反向预测 — 冷泉缺氧应 As 还原主导，故意预测 As 氧化主导
  # ═════════════════════════════════════════════════════════
  - id: as_oxidation_should_dominate_stress_A
    type: pathway_active
    weight: 1.5
    required: false
    description: |
      [PREDICTION] expected_label=unsatisfied
      [REASONING] 冷泉缺氧 + 高 As(V) 环境是经典 As(V)→As(III) 还原占优场景
      （Stolz 2006）。故意预测 As(III)→As(V) 氧化（aoxAB-mediated）应主导。
      期望 EnvMeta reject (returns unsatisfied)。如意外 satisfied，说明：
      (1) 冷泉数据意外含氧化菌 carrier（aoxAB），需重读样品 metadata；
      (2) 或 EnvMeta scorer 不能区分通路方向（鉴别力 limit）。
      不修改 YAML 解决意外，在 results 中如实分析。
    params:
      pathway: "Arsenite oxidation"
      min_completeness: 30

  # ═════════════════════════════════════════════════════════
  #  B. 领域错配 — 冷泉缺氧应 nitrification 受抑，故意预测 nitrification 主导
  # ═════════════════════════════════════════════════════════
  - id: nitrification_should_dominate_stress_B
    type: pathway_active
    weight: 1.0
    required: false
    description: |
      [PREDICTION] expected_label=unsatisfied
      [REASONING] 冷泉沉积物 + 缺氧水柱抑制 nitrification（amoA/B/C 需 O2，
      综述 Bothe et al. 2000 *FEMS Microbiol Rev* 24:673-690；本文原写 "Bothe 2007"
      不存在该文献，2007 是 Elsevier 编辑书 ISBN 978-0-444-52857-5）。故意预测 nitrification
      应主导。期望 EnvMeta reject。如意外 satisfied，说明上层水柱微氧 amo
      carrier 混入或 amoA 序列在缺氧菌中有 lateral transfer 报告。
    params:
      pathway: "Nitrification"
      min_completeness: 30

  # ═════════════════════════════════════════════════════════
  #  C. Negative claim — backbone As 还原应 inactive (Popperian falsifiability)
  # ═════════════════════════════════════════════════════════
  - id: arsenate_reduction_should_NOT_dominate_stress_C
    type: pathway_inactive
    weight: 1.5
    required: false
    description: |
      [PREDICTION] expected_label=unsatisfied (即 pathway 实际 active，违反 negative)
      [REASONING] arsenate reduction 是冷泉砷代谢 backbone（Stolz 2006）。
      用 pathway_inactive 故意否定它，期望 EnvMeta reject (returns unsatisfied
      表示通路实际活跃，违反 negative 预期)。这是 Popperian falsifiability
      主力测试。如意外 satisfied (= pathway inactive)，说明 KEGG 注释缺失或
      数据 As gene 整体弱（与 calibration YAML 期望矛盾，需调查）。
    params:
      pathway: "Arsenate reduction"
      max_completeness: 50

  # ═════════════════════════════════════════════════════════
  #  D. Calibration anchor — 验证 stress YAML 不是评分系统整体崩了
  # ═════════════════════════════════════════════════════════
  - id: as_transport_calibration_anchor_D
    type: pathway_active
    weight: 1.0
    required: false
    description: |
      [PREDICTION] expected_label=satisfied
      [REASONING] As efflux 是 universal 砷抗性（Rosen 2002）。冷泉高 As
      环境必有 arsB/Acr3 carrier。配套 anchor 验证 stress YAML 系统正常。
      如这条也 unsatisfied，说明 stress YAML 整体跑出问题，停下排查。
    params:
      pathway: "As transport/detox"
      min_completeness: 30

# ═══════════════════════════════════════════════════════════════════════
#  REFERENCES (Vancouver + DOI; post-hoc verified 2026-05-09)
# ═══════════════════════════════════════════════════════════════════════
#
# [1] Stolz JF, Basu P, Santini JM, Oremland RS. Arsenic and selenium in
#     microbial metabolism. Annu Rev Microbiol. 2006;60:107-130.
#     DOI: 10.1146/annurev.micro.60.080805.142053
#
# [2] Bothe H, Jost G, Schloter M, Ward BB, Witzel KP. Molecular analysis
#     of ammonia oxidation and denitrification in natural environments.
#     FEMS Microbiol Rev. 2000;24(5):673-690.
#     DOI: 10.1111/j.1574-6976.2000.tb00566.x
#     [⚠️ 引用订正：本 YAML 原写 "Bothe 2007 FEMS Rev"。该 2007 文献不存在
#      （Bothe 2007 是 Elsevier 编辑书 ISBN 978-0-444-52857-5，非期刊综述）。
#      正确支撑文献为 Bothe 2000 FEMS Microbiol Rev]
#
# [3] Rosen BP. Biochemistry of arsenic detoxification. FEBS Lett.
#     2002;529(1):86-92.
#     DOI: 10.1016/S0014-5793(02)03186-1
