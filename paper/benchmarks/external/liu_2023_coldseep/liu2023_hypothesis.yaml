# EnvMeta 假说评分器 — Liu et al. 2023 npj Biofilms 深海冷泉 As 循环
#
# Source: Liu R, Wei X, Song W, et al. (2023) "Unexpected genetic and microbial
#         diversity for arsenic cycling in deep sea cold seep sediments"
#         npj Biofilms and Microbiomes 9:13
# DOI:    10.1038/s41522-023-00382-8
# License: CC BY 4.0 (适用于 Suppl 数据；EnvMeta 输出按 MIT 分发)
#
# ═══════════════════════════════════════════════════════════════════════
#  PRE-DATA HYPOTHESIS（pre-registration 证据）
# ═══════════════════════════════════════════════════════════════════════
#
# 本 YAML 在跑 EnvMeta 之前 commit，作为对照实验的 pre-registration 证据。
# 假设构成原则：
#
#   1. 仅基于 Liu 2022 设计实验时**先验已知**的生物地球化学原理 + 文献综述
#   2. 不引用 Liu 2023 论文的任何具体发现（如 Asgardarchaeota keystone /
#      4484-113 / AABM5-125-24 等新门发现）
#   3. 不为复现 Liu 结论而调阈值或 weight
#   4. EnvMeta 默认阈值（min_completeness=30 / strong=0.75 / suggestive=0.40）
#
# Pre-data 推理路径:
#
#   A. 冷泉沉积物 = 缺氧 + H₂S 富集（Mogollón et al. 2012）
#   B. 还原环境 + 高 As → 砷酸盐还原占优（Stolz 2006; Mukhopadhyay 2002）
#   C. 高 As 浓度 → 微生物必备 efflux 排砷（Rosen 2002）
#   D. 海洋 arsM 甲基化报道有限 (Yin 2011) → 探索性问题
#   E. arrA respiratory reduction 在海洋沉积物有零星报告 (Stolz 2006) → 探索性问题
#
# 因此假设：3 个 confirmatory（含 2 个 required）+ 2 个 exploratory（NOT required）

name: "Liu2023_coldseep_pre-data_hypothesis"
description: |
  Liu et al. 2023 npj Biofilms 深海冷泉 As 循环研究的 pre-data 假设复现。
  基于"还原环境 + 高 As 浓度"先验生物地球化学原理设计的初始假设，
  不引用论文具体发现（Asgardarchaeota 等）以避免循环论证。

version: "1.0"
strong_threshold: 0.75
suggestive_threshold: 0.40

claims:
  # ─────────────────────────────────────────────────────────────────────
  # H1（confirmatory, required）: 冷泉缺氧环境砷酸盐还原应主导
  # 先验依据: Stolz 2006 Nature Reviews Microbiology, Mukhopadhyay 2002 FEMS
  # ─────────────────────────────────────────────────────────────────────
  - id: arsenate_reduction_active_in_anoxic_seep
    type: pathway_active
    weight: 1.5
    required: true
    params:
      pathway: "Arsenate reduction"
      min_completeness: 30
    explanation: |
      Pre-data 预测: 冷泉沉积物缺氧 + 高 As(V) 浓度 → arsC1/arsC2-mediated
      cytosolic 砷酸盐还原应在多个 MAG 中活跃（Stolz 2006）。这是冷泉砷
      代谢的 backbone 通路，required veto: 若不 active，整体假说失败。

  # ─────────────────────────────────────────────────────────────────────
  # H2（confirmatory, required）: 高 As 环境砷转运/解毒应活跃
  # 先验依据: Rosen 2002 Trends in Microbiology — As efflux 是 universal
  # ─────────────────────────────────────────────────────────────────────
  - id: as_transport_detox_active
    type: pathway_active
    weight: 1.0
    required: true
    params:
      pathway: "As transport/detox"
      min_completeness: 30
    explanation: |
      Pre-data 预测: 微生物在高 As 环境必须有 ArsB/Acr3 efflux 系统排砷。
      这是 universal 砷抗性机制，required veto。

  # ─────────────────────────────────────────────────────────────────────
  # H3（exploratory, NOT required）: 砷甲基化是否广泛存在？
  # 先验背景: 海洋 arsM 报道有限 (Yin et al. 2011 ES&T) → 不确定
  # ─────────────────────────────────────────────────────────────────────
  - id: as_methylation_explored
    type: pathway_active
    weight: 0.7
    params:
      pathway: "As methylation"
      min_completeness: 30
    explanation: |
      Pre-data exploration: arsM-mediated 砷甲基化是减毒手段，但在深海
      冷泉的普遍程度未知。EnvMeta 是否能在 1741 MAG 中检测到 arsM 信号？

  # ─────────────────────────────────────────────────────────────────────
  # H4（exploratory, NOT required）: 呼吸型砷酸盐还原（arrA）是否在冷泉发挥作用？
  # 先验背景: Stolz 2006 报告 arrA 在某些海洋沉积物存在
  # ─────────────────────────────────────────────────────────────────────
  - id: respiratory_as_reduction_explored
    type: pathway_active
    weight: 0.5
    params:
      pathway: "Resp. arsenate red."
      min_completeness: 30
    explanation: |
      Pre-data exploration: arrA mediated dissimilatory As(V) reduction
      在某些海洋沉积物报告过（Stolz 2006），但冷泉特异性未知。
