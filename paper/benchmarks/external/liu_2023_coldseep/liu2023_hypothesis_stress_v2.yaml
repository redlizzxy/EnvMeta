# EnvMeta 假说评分器 — Liu et al. 2023 — STRESS TEST v2 (dominance-aware)
#
# Source: Liu R, Wei X, Song W, et al. (2023) npj Biofilms Microbiomes 9:13
# DOI:    10.1038/s41522-023-00382-8
#
# ═══════════════════════════════════════════════════════════════════════
#  PRE-REGISTERED STRESS HYPOTHESIS v2 (Paper 4 / v0.9.x)
# ═══════════════════════════════════════════════════════════════════════
#
# 配套 v1: liu2023_hypothesis_stress.yaml (commit 50c4687, 跑分 ba2055c)
#   v1 结果: overall=0.625 SUGGESTIVE — B 级 discrimination
#   原因: Class A 反向 claim "as_oxidation should dominate" 意外 satisfied，
#         因为冷泉数据真有 2 个 MAG 带 aoxAB (contribution=0.3)，二元
#         mean_completeness ≥ 50% 阈值无法区分"主导"vs"检出但弱"。
#
# v2 改动（v0.9.x dominance_score field 兑现）：
#   - Class A reversed claim 加 `min_dominance_fraction: 0.20`
#     即要求 As oxidation 通路必须占 As element cycle 总 contribution 的 ≥ 20%
#     才能算 satisfied。Liu 数据 As oxidation contrib=0.3 vs As reduction
#     contrib≈6.4，dominance ≈ 0.04 << 0.20 → 应得 unsatisfied
#   - 其他 3 claim (B/C/D) 不变（pre-registration 精神：不基于结果调 claim）
#
# 期望 v2 跑分：
#   - Class A: unsatisfied ✅ (B 级 → A 级 升级关键)
#   - Class B/C/D: 同 v1 (skipped / unsatisfied / satisfied)
#   - overall: ~0.20 (weak, A 级 clean discrimination)
#
# 见 docs/hypothesis_writing_guide.md §4.1 (dominance_score)。

name: "Liu2023_coldseep_stress_hypothesis_v2"
description: |
  Stress test hypothesis v2 — dominance-aware. Class A reversed claim 加
  min_dominance_fraction=0.20 阈值，解决 v1 的二元阈值 limit 暴露的 B 级
  discrimination。配套 v1 形成 "before/after dominance_score" 对照证据。

version: "2.0"
strong_threshold: 0.75
suggestive_threshold: 0.40

claims:
  # ═════════════════════════════════════════════════════════
  #  A. 反向预测 + dominance 阈值 (v0.9.x 新增)
  # ═════════════════════════════════════════════════════════
  - id: as_oxidation_should_dominate_stress_A
    type: pathway_active
    weight: 1.5
    required: false
    description: |
      [PREDICTION] expected_label=unsatisfied
      [REASONING] 同 v1 — 冷泉缺氧应 As 还原主导（Stolz 2006 Annu Rev Microbiol
      DOI:10.1146/annurev.micro.60.080805.142053）。v2 加 min_dominance_fraction
      要求 As oxidation 通路至少占 As element cycle 总贡献的 20%（即真正
      "主导"，而非仅"活跃"）。Liu 数据预期 As oxidation dominance ≈ 0.04 远
      低于 0.20 阈值 → 应正确 unsatisfied。
      [DOMINANCE_FIELD] v0.9.x dominance_score = pathway.total_contribution /
      element.total_contribution_sum；硬阈值（不达即 unsatisfied）。
    params:
      pathway: "Arsenite oxidation"
      min_completeness: 30
      min_dominance_fraction: 0.20

  # ═════════════════════════════════════════════════════════
  #  B. 领域错配 (与 v1 一致)
  # ═════════════════════════════════════════════════════════
  - id: nitrification_should_dominate_stress_B
    type: pathway_active
    weight: 1.0
    required: false
    description: |
      [PREDICTION] expected_label=unsatisfied (或 skipped if KB 过滤)
      [REASONING] 冷泉缺氧抑制 amoA/B/C（Bothe et al. 2000 FEMS Microbiol Rev
      24(5):673-690 DOI:10.1111/j.1574-6976.2000.tb00566.x）。
    params:
      pathway: "Nitrification"
      min_completeness: 30

  # ═════════════════════════════════════════════════════════
  #  C. Negative claim (与 v1 一致)
  # ═════════════════════════════════════════════════════════
  - id: arsenate_reduction_should_NOT_dominate_stress_C
    type: pathway_inactive
    weight: 1.5
    required: false
    description: |
      [PREDICTION] expected_label=unsatisfied (即 pathway 实际 active)
      [REASONING] 同 v1 — arsenate reduction 是冷泉砷代谢 backbone (Stolz 2006)
    params:
      pathway: "Arsenate reduction"
      max_completeness: 50

  # ═════════════════════════════════════════════════════════
  #  D. Calibration anchor (与 v1 一致)
  # ═════════════════════════════════════════════════════════
  - id: as_transport_calibration_anchor_D
    type: pathway_active
    weight: 1.0
    required: false
    description: |
      [PREDICTION] expected_label=satisfied
      [REASONING] 同 v1 — As efflux 是 universal 砷抗性
      (Rosen 2002 FEBS Lett 529(1):86-92 DOI:10.1016/S0014-5793(02)03186-1)
    params:
      pathway: "As transport/detox"
      min_completeness: 30

# ═══════════════════════════════════════════════════════════════════════
#  REFERENCES (Vancouver + DOI; 同 v1 + dominance_score 实现引用)
# ═══════════════════════════════════════════════════════════════════════
#
# [1] Stolz JF, Basu P, Santini JM, Oremland RS. Arsenic and selenium in
#     microbial metabolism. Annu Rev Microbiol. 2006;60:107-130.
#     DOI: 10.1146/annurev.micro.60.080805.142053
#
# [2] Bothe H, Jost G, Schloter M, Ward BB, Witzel KP. Molecular analysis
#     of ammonia oxidation and denitrification in natural environments.
#     FEMS Microbiol Rev. 2000;24(5):673-690.
#     DOI: 10.1111/j.1574-6976.2000.tb00566.x
#
# [3] Rosen BP. Biochemistry of arsenic detoxification. FEBS Lett.
#     2002;529(1):86-92.
#     DOI: 10.1016/S0014-5793(02)03186-1
#
# [4] EnvMeta v0.9.x dominance_score field implementation:
#     `_compute_dominance_score()` in `envmeta/geocycle/hypothesis.py`
#     dominance_score = pathway.total_contribution /
#                       sum(all pathways in element).total_contribution
