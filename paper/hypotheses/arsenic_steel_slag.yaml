# ═══════════════════════════════════════════════════════════════════════════
#
# [1] Keeney RL, Raiffa H. Decisions with Multiple Objectives: Preferences
#     and Value Tradeoffs. Cambridge: Cambridge University Press; 1993.
#     DOI: 10.1017/CBO9781139174084
#     — MCDA 奠基教科书（1976 Wiley 版由 Cambridge 1993 再版）
#
# [2] Belton V, Stewart TJ. Multiple Criteria Decision Analysis: An
#     Integrated Approach. Boston: Springer; 2002.
#     DOI: 10.1007/978-1-4615-1495-4
#     — 当代 MCDA 标准参考；"权重 × 分数 → 综合评价" 的工程实现
#
# [3] Hill AB. The Environment and Disease: Association or Causation?
#     Proc R Soc Med. 1965;58(5):295-300.
#     DOI: 10.1177/003591576505800503
#     — Bradford Hill 九条因果判据原始文献；流行病学引用 20000+
#
# [4] Suter GW II, Cormier SM. Why and how to combine evidence in
#     environmental assessments: Weighing evidence and building cases.
#     Sci Total Environ. 2011;409(8):1406-17.
#     DOI: 10.1016/j.scitotenv.2010.12.029
#     — EPA 生态风险评估中 "weight-of-evidence" 的方法论总纲
#
# [5] Linkov I, Loney D, Cormier S, Satterstrom FK, Bridges T.
#     Weight-of-evidence evaluation in environmental assessment: review
#     of qualitative and quantitative approaches.
#     Sci Total Environ. 2009;407(19):5199-205.
#     DOI: 10.1016/j.scitotenv.2009.05.004
#     — 定量 vs 定性 WoE 方法的系统评述
#
# [6] Rhomberg LR, Goodman JE, Bailey LA, Prueitt RL, Beck NB, Bevan C,
#     et al. A survey of frameworks for best practices in weight-of-
#     evidence analyses. Crit Rev Toxicol. 2013;43(9):753-84.
#     DOI: 10.3109/10408444.2013.832727
#     — 对 50+ WoE 框架的横向比较；"透明性 + 可审计性" 是共性要求
#
# [7] Fisher RA. The Design of Experiments. Edinburgh: Oliver and Boyd;
#     1935.
#     (OCLC 905211158；无 DOI；再版至第 9 版 1971 Hafner/Macmillan)
#     — 排列检验（permutation test）的经典奠基；本评分器 null_p 指标的
#       方法学来源。
